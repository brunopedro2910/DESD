services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-gather_db}
      POSTGRES_USER: ${DB_USER:-gather_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gather_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gather_user} -d ${DB_NAME:-gather_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  web:
    build: .
    command: gunicorn exchange.wsgi:application --chdir /app/fresh_exchange --bind 0.0.0.0:8000 --workers 2 --timeout 120
    ports:
      - "8000:8000"
    environment: &django-environment
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-development-only-change-me-before-public-deployment-0123456789}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DB_NAME: ${DB_NAME:-gather_db}
      DB_USER: ${DB_USER:-gather_user}
      DB_PASSWORD: ${DB_PASSWORD:-gather_dev_password}
      DB_HOST: db
      DB_PORT: 5432
      CACHE_URL: redis://redis:6379/1
      USE_REDIS_CACHE: ${USE_REDIS_CACHE:-true}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      DJANGO_SECURE_COOKIES: ${DJANGO_SECURE_COOKIES:-false}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-false}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/static_collected
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    profiles: ["proxy"]
    ports:
      - "8080:80"
    volumes:
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
